name: Angular CI

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-angular.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-angular.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Test
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Clean install dependencies
      run: npm ci
      timeout-minutes: 10

    - name: Run linter (if configured)
      shell: bash
      run: |
        if node -e "const scripts=require('./package.json').scripts || {}; process.exit(scripts.lint ? 0 : 1)"; then
          npm run lint
        else
          echo "No lint script configured; skipping lint."
        fi
      timeout-minutes: 5

    - name: Build production
      run: npm run ng -- build --configuration production
      timeout-minutes: 15

    - name: Run unit tests
      run: npm test -- --no-watch --code-coverage --progress=false
      timeout-minutes: 15

    - name: Upload test and coverage artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-angular
        path: frontend/coverage/**
        if-no-files-found: warn
        retention-days: 14

    - name: Upload coverage reports
      if: success()
      uses: codecov/codecov-action@v5
      with:
        files: './frontend/coverage/lcov.info'
        flags: frontend
        fail_ci_if_error: false
        verbose: true

    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-angular
        path: 'frontend/dist'
        retention-days: 7
