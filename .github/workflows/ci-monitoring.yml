name: Monitoring CI

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'scripts/Monitoring/**'
      - 'sql/11_Monitoring_DB_Security_Health.sql'
      - 'docs/operations/MONITORING_OPERABILITY.md'
      - '.github/workflows/ci-monitoring.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'scripts/Monitoring/**'
      - 'sql/11_Monitoring_DB_Security_Health.sql'
      - 'docs/operations/MONITORING_OPERABILITY.md'
      - '.github/workflows/ci-monitoring.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monitoring:
    runs-on: ubuntu-latest
    name: Monitoring smoke checks
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run monitoring checks (safe mode)
      shell: pwsh
      run: ./scripts/Monitoring/Run-MonitoringChecks.ps1 -Ci

    - name: Upload monitoring artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: monitoring-artifacts
        path: artifacts/monitoring
        if-no-files-found: warn
        retention-days: 14
