name: .NET CI

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Riada.sln'
      - '.github/workflows/ci-dotnet.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Riada.sln'
      - '.github/workflows/ci-dotnet.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build, Test & Publish
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET SDK 8.x
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json', 'global.json') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Restore NuGet packages
      run: dotnet restore Riada.sln --nologo
      timeout-minutes: 5

    - name: Build solution
      run: dotnet build Riada.sln --configuration Release --no-restore --nologo
      timeout-minutes: 10

    - name: Run unit tests
      run: dotnet test tests/Riada.UnitTests/Riada.UnitTests.csproj --configuration Release --no-build --nologo --verbosity normal --collect:"XPlat Code Coverage" --logger "trx;LogFileName=unit-test-results.trx"
      timeout-minutes: 10

    - name: Run integration tests
      run: dotnet test tests/Riada.IntegrationTests/Riada.IntegrationTests.csproj --configuration Release --no-build --nologo --verbosity normal --collect:"XPlat Code Coverage" --logger "trx;LogFileName=integration-test-results.trx"
      timeout-minutes: 15

    - name: Publish API
      run: dotnet publish src/Riada.API/Riada.API.csproj --configuration Release --no-build --nologo --output artifacts/publish
      timeout-minutes: 5

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-dotnet
        path: |
          **/TestResults/**/*.trx
          **/TestResults/**/coverage.cobertura.xml
        if-no-files-found: warn
        retention-days: 30

    - name: Publish coverage reports
      if: success()
      uses: codecov/codecov-action@v5
      with:
        files: '**/coverage.cobertura.xml'
        flags: dotnet
        fail_ci_if_error: false
        verbose: true

    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-dotnet
        path: artifacts/publish
        if-no-files-found: error
        retention-days: 7
