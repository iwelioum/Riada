services:
  mysql:
    image: mysql:8.0
    profiles:
      - docker
    environment:
      MYSQL_DATABASE: riada_db
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../../sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - riada-network

  api:
    profiles:
      - docker
    build:
      context: ../..
      dockerfile: scripts/Docker/Dockerfile
    environment:
      ConnectionStrings__RiadaDb: "Server=mysql;Port=3306;Database=riada_db;User=root;Password=;SslMode=Preferred;AllowPublicKeyRetrieval=True"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Jwt__SecretKey: ${JWT_SECRET_KEY}
    ports:
      - "5275:5275"
      - "5174:5174"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5174/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - riada-network
    restart: unless-stopped

  api-local:
    profiles:
      - local
    build:
      context: ../..
      dockerfile: scripts/Docker/Dockerfile
    environment:
      ConnectionStrings__RiadaDb: "Server=host.docker.internal;Port=3306;Database=riada_db;User=root;Password=;SslMode=Preferred;AllowPublicKeyRetrieval=True"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Jwt__SecretKey: ${JWT_SECRET_KEY}
    ports:
      - "5275:5275"
      - "5174:5174"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5174/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - riada-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  riada-network:
    driver: bridge
