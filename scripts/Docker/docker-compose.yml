services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: riada_db
      MYSQL_USER: riada_user
      MYSQL_PASSWORD: riada_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../../sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - riada-network

  api:
    build:
      context: ../..
      dockerfile: scripts/Docker/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=riada_db;User=riada_user;Password=riada_password;"
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__SecretKey: "your-secret-key-change-in-production"
      Jwt__Issuer: "Riada"
      Jwt__Audience: "RiadaAPI"
    ports:
      - "5275:5275"
      - "5174:5174"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - riada-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  riada-network:
    driver: bridge
