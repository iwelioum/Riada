services:
  mysql:
    image: mysql:8.0
    profiles:
      - docker
    environment:
      MYSQL_DATABASE: riada_db
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../../sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - riada-network

  # Profile 'docker': API + MySQL fully containerized
  api:
    profiles:
      - docker
    build:
      context: ../..
      dockerfile: scripts/Docker/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: "http://+:5001"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ALLOW_DEV_BYPASS: "false"
      ConnectionStrings__RiadaDb: "Server=mysql;Port=3306;Database=riada_db;User=root;Password=;SslMode=Preferred;AllowPublicKeyRetrieval=True"
    ports:
      - "5001:5001"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - riada-network
    restart: unless-stopped

  # Profile 'local': API in Docker, MySQL on host WampServer (port 3306)
  api-local:
    profiles:
      - local
    build:
      context: ../..
      dockerfile: scripts/Docker/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: "http://+:5001"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ALLOW_DEV_BYPASS: ${ALLOW_DEV_BYPASS:-false}
      ConnectionStrings__RiadaDb: "Server=host.docker.internal;Port=3306;Database=riada_db;User=root;Password=;SslMode=Preferred;AllowPublicKeyRetrieval=True"
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - riada-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  riada-network:
    driver: bridge
