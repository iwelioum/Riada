<div class="page">
  <div class="page-header">
    <div>
      <div class="eyebrow">Nutrition</div>
      <h1>Meal Plan</h1>
      <p class="text-muted">Prépare tes repas de la semaine.</p>
    </div>
    <button class="pill solid" routerLink="/meal-plan/summary">Voir détails</button>
  </div>

  <div class="grid-2">
    <div class="card day" *ngFor="let day of plan">
      <div class="flex-between">
        <div class="day-title">{{ day.day }}</div>
        <div class="pill muted">{{ day.calories }} cal</div>
      </div>
      <ul>
        <li *ngFor="let meal of day.meals">{{ meal }}</li>
      </ul>
    </div>
  </div>
</div>
