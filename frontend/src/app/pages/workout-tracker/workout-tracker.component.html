<div class="page">
  <div class="page-header">
    <div>
      <div class="eyebrow">Tracking</div>
      <h1>Workout Tracker</h1>
      <p class="text-muted">Historique des séances et calories brûlées.</p>
    </div>
  </div>

  <div class="grid-2">
    <div class="card workout" *ngFor="let workout of workouts">
      <div>
        <div class="name">{{ workout.name }}</div>
        <div class="text-muted">{{ workout.time }}</div>
      </div>
      <div class="pill muted">{{ workout.calories }} cal</div>
    </div>
  </div>
</div>
