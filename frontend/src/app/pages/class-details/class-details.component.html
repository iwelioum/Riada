<div class="page">
  <div class="page-header">
    <div>
      <div class="eyebrow">Classes</div>
      <h1>{{ title }}</h1>
      <p class="text-muted">Détails de la session et des objectifs.</p>
    </div>
    <button class="pill solid">Book</button>
  </div>

  <div class="card">
    <div class="detail-line"><strong>Coach</strong><span>{{ instructor }}</span></div>
    <div class="detail-line"><strong>Durée</strong><span>{{ duration }}</span></div>
    <div class="detail-line"><strong>Niveau</strong><span>{{ level }}</span></div>
    <div class="detail-line"><strong>Focus</strong><span>Force, cardio, mobilité</span></div>
  </div>
</div>
